<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <title>Villode · Weather</title>
  <style>
    :root {
      --text: #f2f6f8;
      --muted: rgba(230, 238, 242, 0.55);
      --line: rgba(255, 255, 255, 0.10);
      --panel: rgba(9, 17, 20, 0.72);
      --font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Inter",
        "Noto Sans SC", "PingFang SC", system-ui, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #111820;
      color: var(--text);
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
      user-select: none;
    }

    .bg {
      position: fixed;
      inset: 0;
      background:
        linear-gradient(110deg, #344c5c, #17252f 68%, #10191f);
      transition: background 1.6s ease, filter 1.6s ease;
    }

    body[data-weather="clear"] .bg {
      background: #63afe0;
    }

    body[data-weather="cloud"] .bg,
    body[data-weather="fog"] .bg {
      background:
        radial-gradient(ellipse at 28% 20%, rgba(225, 235, 239, .42), transparent 42%),
        linear-gradient(145deg, #71838c, #40515b 52%, #24333b);
    }

    body[data-weather="rain"] .bg,
    body[data-weather="storm"] .bg {
      background:
        linear-gradient(90deg, rgba(5, 14, 18, .06), rgba(5, 14, 18, .45) 68%, rgba(5, 14, 18, .70)),
        url("assets/weather-rain-glass.png") center / cover no-repeat;
      filter: saturate(.82) brightness(.82);
    }

    body[data-weather="snow"] .bg {
      background:
        radial-gradient(ellipse at 30% 18%, rgba(238, 247, 251, .68), transparent 38%),
        linear-gradient(155deg, #9cb5c2, #607986 54%, #344751);
    }

    .layout {
      position: fixed;
      inset: 0;
      display: grid;
      grid-template-columns: minmax(0, 64fr) minmax(340px, 36fr);
    }

    .hero {
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: clamp(46px, 6vw, 110px);
      padding-left: max(108px, 7vw);
      padding-bottom: max(132px, 10vh);
    }

    .brand {
      display: none;
      position: absolute;
      top: clamp(20px, 3vh, 36px);
      left: clamp(28px, 4vw, 56px);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: lowercase;
      color: rgba(255, 255, 255, 0.55);
    }

    .hero-main {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-end;
      gap: clamp(16px, 2.5vw, 36px);
    }

    .temp {
      font-size: clamp(88px, 8vw, 144px);
      font-weight: 200;
      letter-spacing: -0.05em;
      line-height: 0.9;
      font-variant-numeric: tabular-nums;
    }

    .temp sup {
      font-size: 0.38em;
      font-weight: 300;
      vertical-align: super;
      margin-left: 2px;
    }

    .place {
      padding-bottom: clamp(6px, 1vw, 14px);
    }

    .place h1 {
      font-size: clamp(28px, 3.4vw, 42px);
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1.1;
    }

    .place-title {
      display: flex;
      align-items: center;
      gap: 11px;
    }

    .place .meta {
      margin-top: 8px;
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 0.02em;
    }

    .cond {
      display: flex;
      align-items: center;
      gap: 10px;
      padding-bottom: clamp(8px, 1.2vw, 16px);
      color: rgba(240, 246, 250, 0.82);
      font-size: 14px;
      font-weight: 450;
    }

    .cond svg {
      width: 28px;
      height: 28px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.6;
      stroke-linecap: round;
      stroke-linejoin: round;
      opacity: 0.9;
    }

    .side {
      display: flex;
      flex-direction: column;
      margin-bottom: clamp(88px, 9vh, 108px);
      background: transparent;
      border-left: 0;
      border-bottom: 0;
      border-radius: 0 0 0 24px;
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
      box-shadow: none;
    }

    .effects {
      position: fixed;
      inset: 0 36% 0 0;
      overflow: hidden;
      pointer-events: none;
    }

    .clear-scene {
      position: absolute;
      inset: 0;
      opacity: 0;
      overflow: hidden;
      transition: opacity 1.4s ease;
    }

    body[data-weather="clear"] .clear-scene { opacity: 0; }

    .clear-video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      filter: saturate(.92) brightness(.93);
      transition: opacity 1.4s ease;
    }

    body[data-weather="clear"] .clear-video.active { opacity: 1; }

    .cloud-video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      filter: saturate(.82) brightness(.78);
      transition: opacity 1.4s ease;
    }

    body[data-weather="cloud"] .cloud-video { opacity: 1; }

    .clear-video-shade {
      position: fixed;
      inset: 0;
      opacity: 0;
      background:
        linear-gradient(90deg, rgba(20, 57, 78, .08), transparent 52%, rgba(12, 33, 45, .16)),
        linear-gradient(0deg, rgba(19, 42, 52, .22), transparent 45%);
      transition: opacity 1.4s ease;
    }

    body[data-weather="clear"] .clear-video-shade { opacity: 1; }

    .sun-glow {
      position: absolute;
      width: min(11vw, 150px);
      aspect-ratio: 1;
      left: 12%;
      top: 13%;
      border-radius: 50%;
      background: radial-gradient(circle at 42% 38%, #fffef1 0 18%, #fff7c7 52%, #ffe9a3 100%);
      box-shadow:
        0 0 22px rgba(255, 247, 199, .92),
        0 0 75px 24px rgba(255, 218, 139, .48),
        0 0 180px 80px rgba(255, 196, 106, .18);
      animation: sunlight 10s ease-in-out infinite alternate;
    }

    .clear-haze {
      position: absolute;
      left: -8%;
      right: -8%;
      bottom: -4%;
      height: 42%;
      background:
        radial-gradient(ellipse at 24% 100%, rgba(255, 222, 185, .48), transparent 52%),
        linear-gradient(to top, rgba(232, 225, 211, .38), transparent 76%);
      filter: blur(12px);
      animation: haze-breathe 14s ease-in-out infinite alternate;
    }

    .clear-cloud {
      position: absolute;
      width: var(--w);
      height: calc(var(--w) * .105);
      left: var(--left);
      top: var(--top);
      opacity: var(--opacity);
      border-radius: 999px;
      filter: blur(var(--blur));
      background: linear-gradient(to bottom, rgba(255,255,255,.88), rgba(239,247,250,.54));
      box-shadow:
        calc(var(--w) * .12) calc(var(--w) * -.045) 0 calc(var(--w) * -.01) rgba(255,255,255,.76),
        calc(var(--w) * .29) calc(var(--w) * -.085) 0 calc(var(--w) * .015) rgba(255,255,255,.82),
        calc(var(--w) * .49) calc(var(--w) * -.055) 0 calc(var(--w) * .005) rgba(250,253,254,.78),
        calc(var(--w) * .70) calc(var(--w) * -.025) 0 calc(var(--w) * -.012) rgba(246,251,252,.62),
        0 12px 24px rgba(91,145,174,.12);
      animation: clear-cloud-drift var(--duration) linear infinite;
      animation-delay: var(--delay);
      will-change: transform;
    }

    .clear-cloud.far {
      --w: 31vw; --left: -36vw; --top: 18%; --opacity: .44;
      --blur: 3px; --duration: 72s; --delay: -24s;
    }

    .clear-cloud.mid {
      --w: 44vw; --left: -50vw; --top: 34%; --opacity: .68;
      --blur: 1.5px; --duration: 58s; --delay: -8s;
    }

    .clear-cloud.near {
      --w: 52vw; --left: -58vw; --top: 56%; --opacity: .36;
      --blur: 5px; --duration: 46s; --delay: -31s;
    }

    .cloud-bank {
      position: absolute;
      width: 72vw;
      height: 28vh;
      left: -10vw;
      top: 5vh;
      opacity: 0;
      filter: blur(28px);
      background:
        radial-gradient(ellipse at 20% 70%, rgba(235, 242, 245, .45), transparent 31%),
        radial-gradient(ellipse at 52% 42%, rgba(213, 224, 230, .42), transparent 35%),
        radial-gradient(ellipse at 82% 66%, rgba(185, 201, 209, .38), transparent 31%);
      transition: opacity 1.4s ease;
      animation: clouds-drift 24s ease-in-out infinite alternate;
    }

    body[data-weather="fog"] .cloud-bank,
    body[data-weather="rain"] .cloud-bank,
    body[data-weather="storm"] .cloud-bank,
    body[data-weather="snow"] .cloud-bank { opacity: .9; }

    .precipitation {
      position: absolute;
      inset: -20% 0 0;
      opacity: 0;
      transition: opacity 1s ease;
    }

    body[data-weather="rain"] .precipitation,
    body[data-weather="storm"] .precipitation,
    body[data-weather="snow"] .precipitation { opacity: 1; }

    .drop {
      position: absolute;
      left: var(--x);
      top: var(--y);
      width: 1px;
      height: var(--length);
      opacity: var(--alpha);
      background: rgba(218, 238, 246, .78);
      transform: rotate(10deg);
      animation: rain-fall var(--speed) linear infinite;
      animation-delay: var(--delay);
    }

    body[data-weather="snow"] .drop {
      width: var(--size);
      height: var(--size);
      border-radius: 50%;
      background: rgba(255, 255, 255, .9);
      transform: none;
      animation-name: snow-fall;
    }

    .lightning {
      position: absolute;
      inset: 0;
      opacity: 0;
      background: rgba(219, 230, 255, .65);
    }

    body[data-weather="storm"] .lightning { animation: lightning 9s infinite; }

    @keyframes clear-sky-shift {
      to { filter: saturate(1.06) brightness(1.035); }
    }
    @keyframes sunlight {
      to { transform: translate3d(0, 5px, 0) scale(1.035); box-shadow: 0 0 28px rgba(255,247,199,.96), 0 0 88px 30px rgba(255,218,139,.54), 0 0 200px 92px rgba(255,196,106,.21); }
    }
    @keyframes haze-breathe {
      to { transform: translate3d(2vw, -1vh, 0) scale(1.04); opacity: .82; }
    }
    @keyframes clear-cloud-drift {
      to { transform: translate3d(132vw, 2vh, 0); }
    }
    @keyframes clouds-drift { to { transform: translate3d(8vw, 2vh, 0); } }
    @keyframes rain-fall { to { transform: translate3d(8vh, 125vh, 0) rotate(10deg); } }
    @keyframes snow-fall { to { transform: translate3d(5vw, 125vh, 0) rotate(180deg); } }
    @keyframes lightning {
      0%, 84%, 87%, 90%, 100% { opacity: 0; }
      85%, 89% { opacity: .5; }
      86% { opacity: .12; }
    }

    .side-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 22px;
      border-bottom: 1px solid var(--line);
    }

    .side-top .label {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.45);
      letter-spacing: 0.02em;
    }

    .place-select-wrap {
      display: none;
      position: relative;
      width: 28px;
      height: 28px;
    }

    .place-select {
      display: grid;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      border: 1px solid rgba(255, 255, 255, .28);
      border-radius: 50%;
      outline: none;
      background: transparent;
      padding: 0;
      color: rgba(250, 252, 254, .82);
      font-family: inherit;
      cursor: pointer;
      transition: background 160ms ease, border-color 160ms ease;
    }

    .place-select:hover,
    .place-select[aria-expanded="true"] {
      background: rgba(255, 255, 255, .06);
      border-color: rgba(255, 255, 255, .13);
    }

    .place-select .chevron {
      width: 6px;
      height: 6px;
      border-right: 1.5px solid rgba(255,255,255,.58);
      border-bottom: 1.5px solid rgba(255,255,255,.58);
      transform: translateY(-2px) rotate(45deg);
      transition: transform 160ms ease;
    }

    .place-select[aria-expanded="true"] .chevron {
      transform: translateY(2px) rotate(225deg);
    }

    .place-menu {
      position: absolute;
      z-index: 10;
      top: auto;
      right: auto;
      bottom: calc(100% + 8px);
      left: 0;
      width: 210px;
      padding: 5px;
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 10px;
      background: rgba(18, 35, 44, .78);
      box-shadow: 0 14px 34px rgba(0,0,0,.20);
      backdrop-filter: blur(22px) saturate(120%);
      -webkit-backdrop-filter: blur(22px) saturate(120%);
    }

    .place-menu[hidden] { display: none; }

    .place-search {
      width: 100%;
      border: 0;
      border-bottom: 1px solid rgba(255,255,255,.10);
      outline: none;
      background: transparent;
      padding: 9px 10px 10px;
      color: rgba(247,250,252,.92);
      font: 13px/1.2 inherit;
    }

    .place-search::placeholder { color: rgba(235,242,246,.38); }

    .place-results {
      max-height: 220px;
      overflow-y: auto;
      padding-top: 4px;
    }

    .place-message {
      padding: 11px 10px;
      color: rgba(235,242,246,.42);
      font-size: 12px;
    }

    .place-option {
      display: block;
      width: 100%;
      border: 0;
      border-radius: 7px;
      background: transparent;
      padding: 8px 10px;
      text-align: left;
      color: rgba(240,246,249,.65);
      font: 13px/1.2 inherit;
      cursor: pointer;
    }

    .place-option:hover { background: rgba(255,255,255,.06); color: #fff; }
    .place-option.active { background: rgba(255,255,255,.09); color: #fff; }

    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0 0 0 0);
      white-space: nowrap;
    }

    .side-spacer { flex: 1; }

    .forecast-panel {
      padding: clamp(30px, 5vh, 64px) 22px 0;
    }

    .forecast-panel h2 {
      margin-bottom: 14px;
      color: rgba(255, 255, 255, .78);
      font-size: 13px;
      font-weight: 500;
    }

    .forecast-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      border-top: 1px solid rgba(255, 255, 255, .07);
      border-bottom: 1px solid rgba(255, 255, 255, .07);
    }

    .forecast-row {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 7px;
      min-height: 148px;
      border-right: 1px solid rgba(255, 255, 255, .07);
      color: rgba(245, 250, 252, .86);
      font-size: 12px;
    }

    .forecast-row:last-child { border-right: 0; }

    .forecast-row svg {
      width: 38px;
      height: 38px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.6;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .forecast-row .day {
      color: rgba(245, 250, 252, .88);
      font-weight: 550;
    }

    .forecast-row .condition {
      overflow: hidden;
      width: 100%;
      color: rgba(230, 238, 242, .46);
      text-align: center;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .forecast-row .range {
      color: rgba(255, 255, 255, .9);
      font-size: 13px;
      font-variant-numeric: tabular-nums;
    }

    .forecast-row .range em {
      color: rgba(230, 238, 242, .42);
      font-style: normal;
    }

    .sun-times {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      padding-top: 14px;
      color: rgba(230, 238, 242, .48);
      font-size: 12px;
    }

    .sun-times b {
      margin-left: 6px;
      color: rgba(245, 250, 252, .86);
      font-weight: 500;
    }

    .divider {
      height: 1px;
      margin: 4px 22px 10px;
      background: var(--line);
    }

    .details {
      padding: 6px 22px 28px;
    }

    .details h2 {
      font-size: 13px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.78);
      margin-bottom: 14px;
      letter-spacing: 0.01em;
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 11px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      font-size: 13px;
    }

    .row:last-child { border-bottom: 0; }

    .row .k {
      color: rgba(230, 238, 242, 0.48);
    }

    .row .v {
      color: rgba(245, 250, 252, 0.88);
      font-variant-numeric: tabular-nums;
    }

    .status {
      display: none;
      position: absolute;
      right: clamp(28px, 4vw, 56px);
      top: clamp(20px, 3vh, 36px);
      font-size: 11px;
      color: rgba(255, 255, 255, 0.35);
      letter-spacing: 0.06em;
    }

    @media (max-width: 820px) {
      .layout { grid-template-columns: 1fr; }
      .side { display: none; }
    }
  </style>
</head>
<body>
  <div class="bg" aria-hidden="true"></div>
  <video class="clear-video active" id="clearVideoA" autoplay muted playsinline preload="auto" aria-hidden="true">
    <source src="assets/weather-clear-sky.mp4" type="video/mp4">
  </video>
  <video class="clear-video" id="clearVideoB" muted playsinline preload="auto" aria-hidden="true">
    <source src="assets/weather-clear-sky.mp4" type="video/mp4">
  </video>
  <video class="cloud-video" id="cloudVideo" muted loop playsinline preload="metadata" aria-hidden="true">
    <source src="assets/219415_small.mp4" type="video/mp4">
  </video>
  <div class="clear-video-shade" aria-hidden="true"></div>
  <div class="effects" aria-hidden="true">
    <div class="clear-scene">
      <div class="sun-glow"></div>
      <div class="clear-haze"></div>
      <div class="clear-cloud far"></div>
      <div class="clear-cloud mid"></div>
      <div class="clear-cloud near"></div>
    </div>
    <div class="cloud-bank"></div>
    <div class="precipitation" id="precipitation"></div>
    <div class="lightning"></div>
  </div>

  <div class="layout">
    <section class="hero">
      <div class="brand">the.weather</div>
      <div class="status" id="status">定位中…</div>
      <div class="hero-main">
        <div class="temp" id="temp">--<sup>°</sup></div>
        <div class="place">
          <div class="place-title">
            <h1 id="city">—</h1>
            <div class="place-select-wrap">
              <button class="place-select" id="placeSelect" type="button" aria-label="选择地点" aria-expanded="false">
                <span class="visually-hidden" id="placeSelectText">当前位置</span>
                <span class="chevron" aria-hidden="true"></span>
              </button>
              <div class="place-menu" id="placeMenu" hidden></div>
            </div>
          </div>
          <div class="meta" id="clock">—</div>
        </div>
        <div class="cond">
          <span id="icon" aria-hidden="true"></span>
          <span id="condText">—</span>
        </div>
      </div>
    </section>

    <aside class="side" aria-label="天气详情">
      <div class="forecast-panel">
        <h2>未来天气</h2>
        <div class="forecast-grid" id="forecast"></div>
        <div class="sun-times">
          <span>日出 <b id="sunrise">—</b></span>
          <span>日落 <b id="sunset">—</b></span>
        </div>
      </div>
      <div class="side-spacer" aria-hidden="true"></div>
      <div class="divider"></div>
      <div class="details">
        <h2>天气详情</h2>
        <div class="row"><span class="k" id="d0k">天气</span><span class="v" id="d0v">—</span></div>
        <div class="row"><span class="k">湿度</span><span class="v" id="hum">—</span></div>
        <div class="row"><span class="k">风速</span><span class="v" id="wind">—</span></div>
        <div class="row"><span class="k">降水</span><span class="v" id="rain">—</span></div>
        <div class="row"><span class="k">体感</span><span class="v" id="feel">—</span></div>
      </div>
    </aside>
  </div>

  <script>
    (function () {
      function startSeamlessClearSky() {
        var videos = [
          document.getElementById("clearVideoA"),
          document.getElementById("clearVideoB")
        ];
        var activeVideo = 0;
        var timer = null;

        function schedule(video) {
          clearTimeout(timer);
          var remaining = Math.max(1, (video.duration || 20.5) - 2.6);
          timer = setTimeout(crossfade, remaining * 1000);
        }

        function crossfade() {
          var outgoing = videos[activeVideo];
          activeVideo = 1 - activeVideo;
          var incoming = videos[activeVideo];
          incoming.currentTime = 0;
          incoming.play().catch(function () {});
          incoming.classList.add("active");
          outgoing.classList.remove("active");
          setTimeout(function () {
            outgoing.pause();
            outgoing.currentTime = 0;
          }, 1500);
          schedule(incoming);
        }

        videos[0].addEventListener("loadedmetadata", function () {
          videos[0].play().catch(function () {});
          schedule(videos[0]);
        }, { once: true });
        videos[0].addEventListener("ended", crossfade);
        videos[1].addEventListener("ended", crossfade);
        if (videos[0].readyState >= 1) schedule(videos[0]);
      }

      startSeamlessClearSky();

      var PLACES = [{ name: "本地", lat: null, lon: null, local: true }];

      var WMO = {
        0: ["晴", sun],
        1: ["晴间多云", sunCloud],
        2: ["多云", cloud],
        3: ["阴", cloud],
        45: ["雾", fog],
        48: ["雾凇", fog],
        51: ["小毛毛雨", rain],
        53: ["毛毛雨", rain],
        55: ["大毛毛雨", rain],
        61: ["小雨", rain],
        63: ["中雨", rain],
        65: ["大雨", rain],
        71: ["小雪", snow],
        73: ["中雪", snow],
        75: ["大雪", snow],
        80: ["阵雨", rain],
        81: ["强阵雨", rain],
        82: ["暴雨", rain],
        95: ["雷雨", storm],
        96: ["雷阵雨", storm],
        99: ["强雷雨", storm]
      };

      function svg(paths) {
        return '<svg viewBox="0 0 24 24">' + paths + "</svg>";
      }
      function sun() {
        return svg('<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/>');
      }
      function cloud() {
        return svg('<path d="M7.5 18h9a4 4 0 0 0 .4-8 5.5 5.5 0 0 0-10.6 1.5A3.5 3.5 0 0 0 7.5 18z"/>');
      }
      function sunCloud() {
        return svg('<circle cx="8" cy="9" r="3"/><path d="M8 2.5V4M2.5 9H4M4.2 4.2l1 1"/><path d="M9 18h8.5a3.5 3.5 0 0 0 .3-7 4.8 4.8 0 0 0-9.1 1.2A3 3 0 0 0 9 18z"/>');
      }
      function rain() {
        return svg('<path d="M7.5 15h9a4 4 0 0 0 .4-8 5.5 5.5 0 0 0-10.6 1.5A3.5 3.5 0 0 0 7.5 15z"/><path d="M9 18v2M12.5 17.5v2.5M16 18v2"/>');
      }
      function snow() {
        return svg('<path d="M7.5 15h9a4 4 0 0 0 .4-8 5.5 5.5 0 0 0-10.6 1.5A3.5 3.5 0 0 0 7.5 15z"/><path d="M9 18.2h0M12.5 19h0M16 18.2h0"/>');
      }
      function fog() {
        return svg('<path d="M4 10h16M5 14h14M7 18h10M6 6h12"/>');
      }
      function storm() {
        return svg('<path d="M7.5 14h9a4 4 0 0 0 .4-8 5.5 5.5 0 0 0-10.6 1.5A3.5 3.5 0 0 0 7.5 14z"/><path d="M12 15l-2 4h3l-1.5 3"/>');
      }

      var els = {
        temp: document.getElementById("temp"),
        city: document.getElementById("city"),
        clock: document.getElementById("clock"),
        icon: document.getElementById("icon"),
        condText: document.getElementById("condText"),
        hum: document.getElementById("hum"),
        wind: document.getElementById("wind"),
        rain: document.getElementById("rain"),
        feel: document.getElementById("feel"),
        d0k: document.getElementById("d0k"),
        d0v: document.getElementById("d0v"),
        forecast: document.getElementById("forecast"),
        sunrise: document.getElementById("sunrise"),
        sunset: document.getElementById("sunset"),
        status: document.getElementById("status"),
        placeSelect: document.getElementById("placeSelect"),
        placeSelectText: document.getElementById("placeSelectText"),
        placeMenu: document.getElementById("placeMenu")
      };

      var active = 0;
      var selectedPlace = null;
      var coords = { lat: 39.9042, lon: 116.4074, name: "北京" };
      var searchTimer = null;
      var STORAGE_KEY = "villode.weather.location.v1";
      var lastConfiguredLocation = null;

      function loadSavedPlace() {
        try {
          var saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
          if (!saved || !saved.name || !Number.isFinite(Number(saved.lat)) || !Number.isFinite(Number(saved.lon)))
            return null;
          return {
            name: String(saved.name),
            label: String(saved.label || saved.name),
            lat: Number(saved.lat),
            lon: Number(saved.lon)
          };
        } catch (_error) {
          return null;
        }
      }

      function persistPlace(place) {
        try {
          if (place.local) {
            localStorage.removeItem(STORAGE_KEY);
          } else {
            localStorage.setItem(STORAGE_KEY, JSON.stringify({
              name: place.name,
              label: place.label || place.name,
              lat: place.lat,
              lon: place.lon
            }));
          }
        } catch (_error) {}
      }

      function pad(n) { return n < 10 ? "0" + n : String(n); }

      function tickClock() {
        var now = new Date();
        var t = pad(now.getHours()) + ":" + pad(now.getMinutes());
        var d = now.toLocaleDateString("zh-CN", {
          weekday: "long",
          month: "short",
          day: "numeric"
        });
        els.clock.textContent = t + " · " + d;
        setTimeout(tickClock, 1000 - (now.getMilliseconds() % 1000));
      }

      function codeInfo(code) {
        return WMO[code] || WMO[2];
      }

      function weatherMode(code) {
        if (code === 0 || code === 1) return "clear";
        if (code === 45 || code === 48) return "fog";
        if (code >= 71 && code <= 77) return "snow";
        if (code >= 95) return "storm";
        if ((code >= 51 && code <= 67) || (code >= 80 && code <= 82)) return "rain";
        return "cloud";
      }

      function buildPrecipitation() {
        var layer = document.getElementById("precipitation");
        var html = "";
        for (var i = 0; i < 90; i++) {
          var x = (Math.random() * 100).toFixed(2) + "%";
          var y = (Math.random() * 100).toFixed(2) + "%";
          var length = (14 + Math.random() * 30).toFixed(1) + "px";
          var size = (2 + Math.random() * 5).toFixed(1) + "px";
          var alpha = (.18 + Math.random() * .52).toFixed(2);
          var speed = (.65 + Math.random() * .9).toFixed(2) + "s";
          var delay = (-Math.random() * 2).toFixed(2) + "s";
          html += '<i class="drop" style="--x:' + x + ';--y:' + y + ';--length:' + length + ';--size:' + size + ';--alpha:' + alpha + ';--speed:' + speed + ';--delay:' + delay + '"></i>';
        }
        layer.innerHTML = html;
      }

      function applyWeather(data, name) {
        var c = data.current || {};
        var temp = Math.round(Number(c.temperature_2m));
        var info = codeInfo(c.weather_code);
        var mode = weatherMode(Number(c.weather_code));
        document.body.dataset.weather = mode;
        var cloudVideo = document.getElementById("cloudVideo");
        if (mode === "cloud") {
          cloudVideo.play().catch(function () {});
        } else {
          cloudVideo.pause();
          cloudVideo.currentTime = 0;
        }
        var tempLabel =
          (temp < 0 ? "−" : "") +
          (Math.abs(temp) < 10 ? "0" + Math.abs(temp) : String(Math.abs(temp)));
        els.temp.innerHTML = tempLabel + "<sup>°</sup>";
        els.city.textContent = name;
        els.condText.textContent = info[0];
        els.icon.innerHTML = info[1]();
        els.hum.textContent = (c.relative_humidity_2m != null ? c.relative_humidity_2m : "—") + "%";
        els.wind.textContent = (c.wind_speed_10m != null ? Math.round(c.wind_speed_10m) : "—") + " km/h";
        els.rain.textContent = (c.precipitation != null ? c.precipitation : "—") + " mm";
        els.feel.textContent = (c.apparent_temperature != null ? Math.round(c.apparent_temperature) : "—") + "°";
        els.d0k.textContent = info[0];
        els.d0v.textContent = (c.cloud_cover != null ? c.cloud_cover + "%" : "—");
        els.status.textContent = "Open‑Meteo";

        var daily = data.daily || {};
        var days = daily.time || [];
        els.forecast.innerHTML = days.slice(0, 5).map(function (date, index) {
          var dateLabel = index === 0 ? "今天" : new Date(date + "T12:00:00").toLocaleDateString("zh-CN", { weekday: "short" });
          var dayInfo = codeInfo((daily.weather_code || [])[index]);
          var low = Math.round(Number((daily.temperature_2m_min || [])[index]));
          var high = Math.round(Number((daily.temperature_2m_max || [])[index]));
          return '<div class="forecast-row"><span class="day">' + dateLabel + '</span><span>' + dayInfo[1]() + '</span><span class="condition">' + dayInfo[0] + '</span><span class="range"><em>' + low + '°</em> ' + high + '°</span></div>';
        }).join("");
        els.sunrise.textContent = daily.sunrise && daily.sunrise[0] ? daily.sunrise[0].slice(11, 16) : "—";
        els.sunset.textContent = daily.sunset && daily.sunset[0] ? daily.sunset[0].slice(11, 16) : "—";
      }

      function fetchWeather(lat, lon, name) {
        els.status.textContent = "更新中…";
        var url =
          "https://api.open-meteo.com/v1/forecast?latitude=" + lat +
          "&longitude=" + lon +
          "&current=temperature_2m,relative_humidity_2m,apparent_temperature,precipitation,weather_code,cloud_cover,wind_speed_10m" +
          "&daily=weather_code,temperature_2m_max,temperature_2m_min,sunrise,sunset&forecast_days=5" +
          "&timezone=auto";
        return fetch(url)
          .then(function (r) { return r.json(); })
          .then(function (data) {
            applyWeather(data, name);
          })
          .catch(function () {
            els.status.textContent = "天气不可用";
          });
      }

      function selectPlace(index) {
        active = index;
        els.placeSelectText.textContent = PLACES[index].local ? "当前位置" : PLACES[index].name;
        Array.prototype.forEach.call(els.placeMenu.querySelectorAll(".place-option"), function (item, i) {
          item.classList.toggle("active", i === index);
        });
        var p = PLACES[index];
        selectedPlace = p;
        persistPlace(p);
        if (p.local) {
          fetchWeather(coords.lat, coords.lon, coords.name);
        } else {
          fetchWeather(p.lat, p.lon, p.name);
        }
      }

      function renderCities() {
        els.placeMenu.innerHTML = "";
        var search = document.createElement("input");
        search.className = "place-search";
        search.type = "search";
        search.placeholder = "输入城市或地区";
        search.autocomplete = "off";
        var results = document.createElement("div");
        results.className = "place-results";
        els.placeMenu.appendChild(search);
        els.placeMenu.appendChild(results);

        function renderOptions() {
          results.innerHTML = "";
          PLACES.forEach(function (p, i) {
            var option = document.createElement("button");
            option.type = "button";
            option.className = "place-option";
            option.textContent = p.local ? "当前位置" : (p.label || p.name);
            option.classList.toggle("active", i === active);
            option.addEventListener("click", function () {
              selectPlace(i);
              closePlaceMenu();
            });
            results.appendChild(option);
          });
        }

        renderOptions();
        search.addEventListener("input", function () {
          clearTimeout(searchTimer);
          var query = search.value.trim();
          if (query.length < 2) {
            PLACES = [PLACES[0]];
            active = 0;
            renderOptions();
            return;
          }
          searchTimer = setTimeout(function () {
            results.innerHTML = '<div class="place-message">搜索中…</div>';
            var isChinese = /[\u4e00-\u9fff]/.test(query);
            var lookupQuery = isChinese && !/[市区县州省镇乡]$/.test(query) ? query + "市" : query;
            var url = "https://geocoding-api.open-meteo.com/v1/search?name=" +
              encodeURIComponent(lookupQuery) + "&count=12&language=zh&format=json";
            fetch(url)
              .then(function (r) { return r.json(); })
              .then(function (data) {
                var raw = data.results || [];
                raw.sort(function (a, b) {
                  var aAdmin = /^PPLA/.test(String(a.feature_code || "")) ? 1 : 0;
                  var bAdmin = /^PPLA/.test(String(b.feature_code || "")) ? 1 : 0;
                  if (aAdmin !== bAdmin) return bAdmin - aAdmin;
                  return Number(b.population || 0) - Number(a.population || 0);
                });
                var seen = {};
                var matches = raw.map(function (item) {
                  var parts = [item.name, item.admin1, item.admin2, item.country].filter(Boolean);
                  return {
                    name: item.name,
                    label: parts.filter(function (v, i) { return parts.indexOf(v) === i; }).join(" · "),
                    lat: item.latitude,
                    lon: item.longitude
                  };
                }).filter(function (item) {
                  if (seen[item.label]) return false;
                  seen[item.label] = true;
                  return true;
                }).slice(0, 8);
                PLACES = [{ name: "本地", lat: null, lon: null, local: true }].concat(matches);
                active = 0;
                renderOptions();
                if (!matches.length) results.innerHTML = '<div class="place-message">没有找到该地区</div>';
              })
              .catch(function () {
                results.innerHTML = '<div class="place-message">搜索失败，请重试</div>';
              });
          }, 280);
        });
        els.placeSelectText.textContent = PLACES[active].local ? "当前位置" : PLACES[active].name;
      }

      function closePlaceMenu() {
        els.placeMenu.hidden = true;
        els.placeSelect.setAttribute("aria-expanded", "false");
      }

      els.placeSelect.addEventListener("click", function () {
        var opening = els.placeMenu.hidden;
        els.placeMenu.hidden = !opening;
        els.placeSelect.setAttribute("aria-expanded", opening ? "true" : "false");
        if (opening) {
          var input = els.placeMenu.querySelector(".place-search");
          if (input) setTimeout(function () { input.focus(); }, 0);
        }
      });
      document.addEventListener("click", function (event) {
        if (!event.target.closest(".place-select-wrap")) closePlaceMenu();
      });

      function locate() {
        renderCities();
        fetch("https://ipinfo.io/json")
          .then(function (r) { return r.json(); })
          .then(function (ip) {
            var parts = String(ip.loc || "").split(",");
            if (parts.length !== 2 || !Number.isFinite(Number(parts[0])) || !Number.isFinite(Number(parts[1])))
              throw new Error("IP location unavailable");
            coords = {
              lat: Number(parts[0]),
              lon: Number(parts[1]),
              name: ip.city || ip.region || ip.country || "当前位置"
            };
            renderCities();
            selectPlace(0);
          })
          .catch(locateWithBrowser);
      }

      function applyConfiguredLocation(value) {
        var location = String(value || "").trim();
        if (!location) {
          selectedPlace = null;
          locate();
          return;
        }

        var coordinateMatch = location.match(/^\s*(-?\d+(?:\.\d+)?)\s*,\s*(-?\d+(?:\.\d+)?)\s*$/);
        if (coordinateMatch) {
          var latitude = Number(coordinateMatch[1]);
          var longitude = Number(coordinateMatch[2]);
          selectedPlace = { name: "自定义位置", lat: latitude, lon: longitude };
          fetchWeather(latitude, longitude, "自定义位置");
          return;
        }

        var isChinese = /[\u4e00-\u9fff]/.test(location);
        var lookup = isChinese && !/[市区县州省镇乡]$/.test(location) ? location + "市" : location;
        var fallbackLookup = lookup.replace(/[市区县州省镇乡]$/, "");

        function queryLocation(name) {
          var url = "https://geocoding-api.open-meteo.com/v1/search?name=" +
            encodeURIComponent(name) + "&count=1&language=zh&format=json";
          return fetch(url)
            .then(function (r) { return r.json(); })
            .then(function (data) {
              var result = data.results && data.results[0];
              if (!result) throw new Error("Location not found");
              return result;
            });
        }

        queryLocation(lookup)
          .catch(function () {
            if (fallbackLookup && fallbackLookup !== lookup)
              return queryLocation(fallbackLookup);
            throw new Error("Location not found");
          })
          .then(function (result) {
            selectedPlace = {
              name: result.name || location,
              lat: Number(result.latitude),
              lon: Number(result.longitude)
            };
            fetchWeather(selectedPlace.lat, selectedPlace.lon, selectedPlace.name);
          })
          .catch(function () {
            els.status.textContent = "位置不可用";
          });
      }

      function syncCaelestiaLocation() {
        if (typeof window.__VILLODE_WEATHER_LOCATION__ === "string") {
          var injectedValue = window.__VILLODE_WEATHER_LOCATION__.trim();
          if (injectedValue !== lastConfiguredLocation) {
            lastConfiguredLocation = injectedValue;
            try { localStorage.removeItem(STORAGE_KEY); } catch (_error) {}
            applyConfiguredLocation(injectedValue);
          }
          return;
        }

        fetch("assets/caelestia-shell.json?t=" + Date.now(), { cache: "no-store" })
          .then(function (r) {
            if (!r.ok) throw new Error("Config unavailable");
            return r.json();
          })
          .then(function (config) {
            var value = String(config.services && config.services.weatherLocation || "").trim();
            if (value === lastConfiguredLocation) return;
            lastConfiguredLocation = value;
            try { localStorage.removeItem(STORAGE_KEY); } catch (_error) {}
            applyConfiguredLocation(value);
          })
          .catch(function () {
            if (lastConfiguredLocation === null) {
              lastConfiguredLocation = "";
              locate();
            }
          });
      }

      function locateWithBrowser() {
        if (!navigator.geolocation) {
          coords = { lat: 39.9042, lon: 116.4074, name: "北京" };
          renderCities();
          selectPlace(0);
          return;
        }
        navigator.geolocation.getCurrentPosition(
          function (pos) {
            coords.lat = pos.coords.latitude;
            coords.lon = pos.coords.longitude;
            // reverse name via open-meteo geocoding optional
            fetch(
              "https://geocoding-api.open-meteo.com/v1/reverse?latitude=" +
                coords.lat + "&longitude=" + coords.lon + "&language=zh&count=1"
            )
              .then(function (r) { return r.json(); })
              .then(function (g) {
                var r0 = g.results && g.results[0];
                coords.name = (r0 && (r0.city || r0.name)) || "本地";
                renderCities();
                selectPlace(0);
              })
              .catch(function () {
                coords.name = "本地";
                renderCities();
                selectPlace(0);
              });
          },
          function () {
            coords = { lat: 39.9042, lon: 116.4074, name: "北京" };
            renderCities();
            selectPlace(0);
          },
          { timeout: 6000, maximumAge: 600000 }
        );
      }

      tickClock();
      buildPrecipitation();
      document.body.dataset.weather = "cloud";
      syncCaelestiaLocation();
      setInterval(syncCaelestiaLocation, 5000);
      setInterval(function () {
        var p = selectedPlace;
        if (!p) return;
        if (p.local) fetchWeather(coords.lat, coords.lon, coords.name);
        else fetchWeather(p.lat, p.lon, p.name);
      }, 15 * 60 * 1000);
    })();
  </script>
</body>
</html>
