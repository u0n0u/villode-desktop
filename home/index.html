<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <title>Villode Aurora</title>
  <style>
    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #071020;
    }

    .wallpaper {
      position: fixed;
      inset: -8%;
      overflow: hidden;
      background:
        radial-gradient(ellipse 95% 80% at 88% 8%, rgba(145, 92, 255, .88), transparent 55%),
        radial-gradient(ellipse 86% 78% at 5% 95%, rgba(20, 139, 236, .76), transparent 58%),
        radial-gradient(ellipse 70% 60% at 78% 92%, rgba(13, 196, 188, .42), transparent 60%),
        linear-gradient(145deg, #050b17 0%, #102856 40%, #231243 72%, #060a14 100%);
      transform: scale(1.04);
      animation: breathe 28s ease-in-out infinite alternate;
    }

    .ribbon {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      transform-origin: center;
    }

    .ribbon.back {
      width: 125vw;
      height: 72vw;
      left: -30vw;
      top: 28vh;
      border: clamp(80px, 11vw, 220px) solid transparent;
      border-top-color: rgba(54, 159, 255, .30);
      border-right-color: rgba(75, 63, 215, .22);
      filter: blur(2px);
      transform: rotate(-13deg);
      animation: drift-back 34s ease-in-out infinite alternate;
    }

    .ribbon.middle {
      width: 104vw;
      height: 60vw;
      right: -24vw;
      top: -20vh;
      border: clamp(75px, 10vw, 190px) solid transparent;
      border-bottom-color: rgba(174, 116, 255, .43);
      border-left-color: rgba(90, 104, 255, .34);
      filter: blur(.5px);
      transform: rotate(18deg);
      animation: drift-middle 30s ease-in-out infinite alternate;
    }

    .ribbon.front {
      width: 96vw;
      height: 48vw;
      right: -18vw;
      bottom: -34vh;
      border: clamp(65px, 8vw, 160px) solid transparent;
      border-top-color: rgba(69, 230, 218, .30);
      border-left-color: rgba(34, 139, 239, .38);
      filter: blur(1px);
      transform: rotate(-7deg);
      animation: drift-front 26s ease-in-out infinite alternate;
    }

    .light {
      position: absolute;
      width: 74vw;
      height: 74vw;
      right: -18vw;
      top: -28vw;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(216, 196, 255, .34), rgba(137, 94, 255, .10) 38%, transparent 68%);
      filter: blur(12px);
      animation: glow 24s ease-in-out infinite alternate;
    }

    .shade {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, rgba(1, 5, 13, .34), transparent 38%, transparent 70%, rgba(6, 3, 18, .12)),
        radial-gradient(ellipse at center, transparent 46%, rgba(2, 5, 13, .25) 100%);
    }

    .grain {
      position: absolute;
      inset: 0;
      opacity: .10;
      mix-blend-mode: soft-light;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 180 180' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.7'/%3E%3C/svg%3E");
    }

    @keyframes breathe {
      from { transform: scale(1.04) translate3d(-.6%, -.4%, 0); filter: saturate(104%); }
      to { transform: scale(1.08) translate3d(.8%, .5%, 0); filter: saturate(116%); }
    }

    @keyframes drift-back {
      from { transform: rotate(-13deg) translate3d(-1.5%, 1%, 0); }
      to { transform: rotate(-10deg) translate3d(2%, -1.5%, 0); }
    }

    @keyframes drift-middle {
      from { transform: rotate(18deg) translate3d(1%, -1%, 0); }
      to { transform: rotate(15deg) translate3d(-1.8%, 1.6%, 0); }
    }

    @keyframes drift-front {
      from { transform: rotate(-7deg) translate3d(-1%, 1.5%, 0); }
      to { transform: rotate(-4deg) translate3d(1.6%, -1%, 0); }
    }

    @keyframes glow {
      from { opacity: .72; transform: translate3d(-2%, 1%, 0) scale(.98); }
      to { opacity: 1; transform: translate3d(2%, -1%, 0) scale(1.05); }
    }

    @media (prefers-reduced-motion: reduce) {
      .wallpaper, .ribbon, .light { animation: none; }
    }
  </style>
</head>
<body>
  <div class="wallpaper" aria-hidden="true">
    <div class="light"></div>
    <div class="ribbon back"></div>
    <div class="ribbon middle"></div>
    <div class="ribbon front"></div>
    <div class="shade"></div>
    <div class="grain"></div>
  </div>
</body>
</html>
